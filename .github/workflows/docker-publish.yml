name: Build and Push multi-arch Docker Image

on:
  # 1. DÉCLENCHEUR MANUEL
  workflow_dispatch:
    inputs:
      custom_tag:
        description: 'Tag Docker manuel (ex: test-ui, beta)'
        required: true
        default: 'dev'
        
  # 2. DÉCLENCHEUR AUTOMATIQUE (Uniquement pour les Releases)
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4

      - name: Configurer QEMU
        uses: docker/setup-qemu-action@v3

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Connexion à GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraire les métadonnées (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/stban1983/notesme
          tags: |
            # --- RÈGLES POUR LE DÉCLENCHEMENT MANUEL ---
            # Utilise la valeur que vous avez saisie dans l'interface GitHub
            type=raw,value=${{ github.event.inputs.custom_tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            
            # --- RÈGLES POUR LES TAGS GIT (RELEASES) ---
            # Crée les tags v1.0.0, v1.0, et met à jour "latest" UNIQUEMENT si c'est un tag Git qui déclenche
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Construire et Pousser l'image (AMD64, ARM64 et Alpine)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
